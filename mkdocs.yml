site_name: Gatling Kafka Extension
site_description: A comprehensive load testing extension for Apache Kafka with Gatling
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Introduction:
      - Getting Started: getting-started.md
      - Kafka 101: kafka-101.md
      - Architecture: architecture.md
  - Protocol & Payload:
      - Configuration: configuration.md
      - Request-Reply Core: request-reply.md
      - Payloads & Serdes: payloads.md
  - Scenarios & API:
      - Assertions & Validation: checks-assertions.md
      - Data-Driven Testing: feeders.md
      - Multi-Protocol: multi-protocol.md
      - Scala Integration: scala.md
      - Resilience & Chaos: resilience-chaos.md
  - Observability:
      - Metrics & Monitoring: metrics.md
